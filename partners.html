


<div id="cryptHero-mobile-perfect-unique" class="cryptHero-root">
    <style>
        #cryptHero-mobile-perfect-unique {
            --ch-bg: #000000;
            --ch-font: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--ch-bg);
            color: #ffffff;
            font-family: var(--ch-font);
            min-height: 90vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Padding reduces on mobile to maximize text space */
            padding: 5vw; 
            box-sizing: border-box;
            /* Prevents the 'CRYPTO' offset from breaking the page width */
            overflow-x: hidden; 
        }

        * {
            margin: 0;
            padding: 0;
        }

        .cryptHero-content-box {
            display: flex;
            flex-direction: column;
            align-items: flex-end; 
            width: 100%;
            max-width: 500px;
            position: relative;
        }

        /* Typography & Gradient */
        .cryptHero-text-line {
            /* Perfectly scales: 40px min, 18vw preferred, 220px max */
            font-size: clamp(40px, 16vw, 150px); 
            font-weight: 200;
            line-height: 0.85;
            text-transform: uppercase;
            letter-spacing: -0.02em;
            margin: 0;
            white-space: nowrap;
            text-align: right;
            
            background: linear-gradient(
                to right,
                #f4f4f4 0%,
                #cdcdcd 40%,
                #666666 75%,
                #1a1a1a 100%
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* The Offset: Using translateX for smoother sub-pixel rendering */
        .cryptHero-crypto-offset {
            transform: translateX(35%);
            z-index: 2;
        }

        /* Description Block */
        .cryptHero-description-wrap {
            margin-top: 40px;
            text-align: right;
            /* Scales width for mobile */
            width: 100%;
            max-width: 400px; 
        }

        .cryptHero-p-text {
            font-size: clamp(10px, 2vw, 14px);
            line-height: 1.4;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 0.12em;
            font-weight: 500;
            margin: 0;
        }

        /* Mobile-Specific Tweaks */
        @media (max-width: 600px) {
            .cryptHero-text-line {
                letter-spacing: -0.03em;
                line-height: 0.9;
            }
            .cryptHero-crypto-offset {
                /* Reduced offset on mobile to prevent clipping important letters */
                transform: translateX(5%);
            }
            .cryptHero-description-wrap {
                margin-top: 25px;
                max-width: 300px;
            }
        }
    </style>

    <div class="cryptHero-content-box">
        <h1 class="cryptHero-text-line">ULTIMATE</h1>
        
        <h1 class="cryptHero-text-line cryptHero-crypto-offset">CRYPTO</h1>
        
        <h1 class="cryptHero-text-line">SOLUTION</h1>

        <div class="cryptHero-description-wrap">
            <p class="cryptHero-p-text">
                CRYPTURE EMPOWERS YOU TO MANAGE <br>
                YOUR DIGITAL ASSETS EFFORTLESSLY.
            </p>
        </div>
    </div>
</div>

    <style>
        :root {
            --crEcosystem-bg-dark: #000000;
            --crEcosystem-text-main: #FFFFFF;
            --crEcosystem-logo-border: rgba(255, 255, 255, 0.1);
            --crEcosystem-logo-size: 100px; 
            --crEcosystem-logo-gap: 12px; /* Tighter gap for a more unified look */
            --crEcosystem-anim-speed: 25s; /* Faster for smoother feel */
        }

        .crEcosystem-wrapper {
            background-color: var(--crEcosystem-bg-dark);
            font-family: 'Circular Std', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--crEcosystem-text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            box-sizing: border-box;
            overflow: hidden;
        }

        .crEcosystem-main-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px; /* Reduced gap between text and logos */
            max-width: 1200px; /* As per your requirement */
            width: 100%;
            align-items: center;
        }

        /* Left Content */
        .crEcosystem-content-col {
            padding-right: 20px;
            z-index: 2;
        }

        .crEcosystem-main-title {
            font-size: 72px;
            font-weight: 700;
            margin: 0;
            letter-spacing: -2px;
            line-height: 1;
        }

        .crEcosystem-sub-title {
            font-size: 72px;
            font-weight: 400;
            margin: 0 0 40px 0;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: -2px;
            line-height: 1;
        }

        .crEcosystem-primary-btn {
            display: inline-flex;
            align-items: center;
            padding: 14px 28px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            background: transparent;
            color: #FFFFFF;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .crEcosystem-primary-btn:hover {
            border-color: #FFFFFF;
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        /* Right Logo Section */
        .crEcosystem-logos-col {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--crEcosystem-logo-gap);
            width: 100%;
            height: 650px; 
            position: relative;
            /* Creates the fade effect at top and bottom */
            -webkit-mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
            mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
        }

        .crEcosystem-ticker-column {
            overflow: hidden;
            height: 100%;
        }

        .crEcosystem-logo-ticker-track {
            display: flex;
            flex-direction: column;
            gap: var(--crEcosystem-logo-gap);
            height: fit-content;
        }

        .crEcosystem-logo-tile {
            width: 100%;
            aspect-ratio: 1/1;
            background: #0a0a0a;
            border: 1px solid var(--crEcosystem-logo-border);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 22%;
            box-sizing: border-box;
        }

        .crEcosystem-logo-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: grayscale(1) brightness(1.5); /* Unified look */
            opacity: 0.7;
            transition: 0.3s;
        }

        .crEcosystem-logo-tile:hover .crEcosystem-logo-img {
            filter: grayscale(0) brightness(1);
            opacity: 1;
        }

        /* Seamless Loop Logic: 
           The track contains 5 unique logos + 5 duplicates.
           We animate exactly the height of the first 5 logos + their gaps.
        */
        @keyframes ticker-up {
            from { transform: translateY(0); }
            to { transform: translateY(calc(-50% - (var(--crEcosystem-logo-gap) / 2))); }
        }

        @keyframes ticker-down {
            from { transform: translateY(calc(-50% - (var(--crEcosystem-logo-gap) / 2))); }
            to { transform: translateY(0); }
        }

        .crEcosystem-col-move-up {
            animation: ticker-up var(--crEcosystem-anim-speed) linear infinite;
        }

        .crEcosystem-col-move-down {
            animation: ticker-down var(--crEcosystem-anim-speed) linear infinite;
        }

        /* Responsiveness */
        @media (max-width: 900px) {
            .crEcosystem-main-layout { grid-template-columns: 1fr; text-align: center; }
            .crEcosystem-content-col { padding-right: 0; order: 2; }
            .crEcosystem-logos-col { height: 400px; order: 1; }
            .crEcosystem-main-title, .crEcosystem-sub-title { font-size: 50px; }
        }
    </style>
</head>
